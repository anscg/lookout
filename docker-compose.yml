services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: lookout
      POSTGRES_USER: lookout
      POSTGRES_PASSWORD: lookout
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lookout"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
